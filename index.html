<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Analyst</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>AI Data Analyst Agent</h1>
        
        <div class="upload-section">
            <h3>Upload Dataset (CSV)</h3>
            <input type="file" id="fileInput" accept=".csv">
            <button onclick="uploadFile()">Upload</button>
            <p id="uploadStatus"></p>
        </div>

        <hr>

        <div class="chat-section">
            <h3>Predict & Analyze</h3>
            <div id="chatBox" class="chat-box"></div>
            <input type="text" id="userInput" placeholder="Ask a question about your data...">
            <button onclick="sendMessage()">Predict</button>
        </div>
    </div>

    <script>
        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('uploadStatus');
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            status.innerText = "Uploading...";

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    status.innerText = "Error: " + data.error;
                } else {
                    status.innerText = "File uploaded successfully!";
                }
            })
            .catch(error => {
                status.innerText = "Error: " + error;
            });
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const message = input.value;

            if (!message) return;

            chatBox.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
            input.value = '';

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                chatBox.innerHTML += `<p><strong>AI:</strong> ${data.response}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(error => {
                chatBox.innerHTML += `<p><strong>Error:</strong> Could not connect to server.</p>`;
            });
        }
    </script>
</body>
</html>
