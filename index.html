<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Analyst Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: var(--primary-color); margin-bottom: 1rem; }
        p { color: #64748b; margin-bottom: 2rem; }
        .upload-section {
            border: 2px dashed #cbd5e1;
            padding: 2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: border 0.3s;
        }
        .upload-section:hover { border-color: var(--primary-color); }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Data Analyst</h1>
        <p>Upload your CSV file and let the AI analyze your data instantly.</p>
        
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-section">
                <input type="file" name="file" id="fileInput" accept=".csv" required>
            </div>
            <button type="submit">Analyze Data</button>
        </form>

        <div id="result" style="margin-top: 2rem; text-align: left;">
            </div>
    </div>

</body>
</html>
