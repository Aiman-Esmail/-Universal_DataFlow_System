<script>
    function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('uploadStatus');
        if (!fileInput.files[0]) {
            alert("Please select a file first!");
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        status.style.color = "blue";
        status.innerText = "Processing...";

        fetch('/upload', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                status.style.color = "red";
                status.innerText = "Error: " + data.error;
            } else {
                status.style.color = "green";
                status.innerText = "Success: " + data.rows + " rows loaded!";
            }
        })
        .catch(err => { 
            status.style.color = "red";
            status.innerText = "Connection Error to Server"; 
        });
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const query = input.value;
        if (!query) return;

        // Add user message to UI
        chatBox.innerHTML += `<div class="user-msg"><strong>You:</strong> ${query}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        // FIXED: Changed /chat to /analyze to match app.py
        fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query })
        })
        .then(res => res.json())
        .then(data => {
            const responseText = data.response || data.error;
            chatBox.innerHTML += `<div class="ai-msg"><strong>AI:</strong> ${responseText}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        })
        .catch(err => { 
            chatBox.innerHTML += `<div style="color:red;">Error: Could not reach the AI Agent.</div>`; 
        });
    }

    // Allow pressing "Enter" to send message
    document.getElementById("userInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>
