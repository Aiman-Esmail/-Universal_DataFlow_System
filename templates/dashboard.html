<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal DataFlow - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Data Processing Dashboard</h2>
            <a href="/clear" class="btn btn-secondary">Upload Another File</a>
        </div>
        
        <div class="card p-4 mb-4 shadow-sm border-0">
            <h5>File Information</h5>
            <p><strong>Active File Name:</strong> <span class="text-primary">{{ filename }}</span></p>
            <p class="text-success"><strong>{{ shape }}</strong></p>
        </div>

        <div class="card p-4 shadow-sm border-0">
            <h5 class="mb-3">Dataset Preview (First 10 Rows)</h5>
            <div class="table-responsive">
                {{ preview | safe }}
            </div>
        </div>
    </div>
</body>
</html>
