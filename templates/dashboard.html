<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal DataFlow - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .table-responsive { direction: ltr; text-align: left; }
    </style>
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Data Processing Dashboard / لوحة التحكم</h2>
            <a href="/clear" class="btn btn-secondary">Upload Another File / رفع ملف آخر</a>
        </div>
        
        <div class="card p-4 mb-4 shadow-sm border-0">
            <h5>File Information / معلومات الملف</h5>
            <p><strong>Active File Name:</strong> <span class="text-primary">{{ filename }}</span></p>
            <p class="text-success"><strong>{{ shape }}</strong></p>
        </div>

        <div class="card p-4 shadow-sm border-0 mb-4">
            <h5 class="mb-3">Dataset Preview (Top 10 Rows)</h5>
            <div class="table-responsive">
                {{ preview | safe }}
            </div>
        </div>

        <div class="text-center">
            <a href="/download_pdf" class="btn btn-primary btn-lg">Download PDF Report / تحميل تقرير PDF</a>
        </div>
    </div>
</body>
</html>
